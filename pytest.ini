[pytest]
asyncio_mode = auto
testpaths = tests/unit tests/integration
addopts =
    --cov=custom_components/eufy_vacuum
    --cov-report=term-missing
    --cov-branch
# The canonical htmlcov/ is intentionally NOT a default report: it is written ONLY
# by an explicit `--cov-report=html:htmlcov` (the deliberate regen), so an
# incidental or sub-agent coverage run can never clobber it. Default runs get the
# term-missing summary; for a disposable html report use
# `--cov-report=html:htmlcov_scratch` (gitignored).
