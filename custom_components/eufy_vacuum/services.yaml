      name: Label
      required: true
      selector:
        text: {}
    clean_mode:
      name: Clean mode
      required: true
      selector:
        text: {}
    fan_speed:
      name: Fan speed
      required: true
      selector:
        text: {}
    water_level:
      name: Water level
      required: true
      selector:
        text: {}
    clean_intensity:
      name: Clean intensity
      required: true
      selector:
        text: {}
    clean_passes:
      name: Clean passes
      required: true
      selector:
        number:
          min: 1
          max: 2
          step: 1
          mode: box
    carpet:
      name: Carpet
      required: true
      selector:
        boolean: {}
    edge_mopping:
      name: Edge mopping
      required: true
      selector:
        boolean: {}
    profile_name:
      name: Profile name
      description: Optional stable backend key. Omit to keep the legacy user slot.
      required: false
      selector:
        text: {}

save_room_profile_from_room:
  name: Save room profile from room
  description: Save a new custom room profile from one room's current effective settings.
  fields:
    vacuum_entity_id:
      name: Vacuum entity
      required: true
      selector:
        entity:
          domain: vacuum
    map_id:
      name: Map ID
      description: Leave blank to use the current active map.
      required: false
      selector:
        text: {}
    room_id:
      name: Room ID
      required: true
      selector:
        number:
          min: 0
          max: 9999
          step: 1
          mode: box
    label:
      name: Label
      required: true
      selector:
        text: {}
    profile_name:
      name: Profile name
      description: Optional stable backend key. Omit to create a new generated custom profile.
      required: false
      selector:
        text: {}

overwrite_room_profile:
