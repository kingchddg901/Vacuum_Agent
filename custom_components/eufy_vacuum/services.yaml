  fields:
    vacuum_entity_id:
      name: Vacuum entity
      required: true
      selector:
        entity:
          domain: vacuum

get_metrics_snapshot:
  name: Get metrics snapshot
  description: >
    Return a metrics-focused payload for the card, including lifetime and
    recent-window totals, room metrics, room-profile metrics, dock metrics,
    and found profile candidates without the per-job review list.
  fields:
    vacuum_entity_id:
      name: Vacuum entity
      required: true
      selector:
        entity:
          domain: vacuum
    room_slug:
      name: Room slug
      description: Optional room filter for metrics and aggregates.
      required: false
      selector:
        text: {}
    profile_key:
      name: Profile key
      description: Optional observed room-profile filter.
      required: false
      selector:
        text: {}
    status:
      name: Status
      description: Optional job status filter such as completed or cancelled.
      required: false
      selector:
        text: {}
    used_for_learning:
      name: Used for learning
      description: Optional filter for only learned or excluded runs.
      required: false
      selector:
        boolean: {}

restore_learning_job:
  name: Restore learning job
  description: >
    Restore one archived completed job back into learning and rebuild learned
    stats without deleting the archived file.
  fields:
    vacuum_entity_id:
      name: Vacuum entity
      required: true
      selector:
        entity:
          domain: vacuum
    job_id:
      name: Job ID
      description: Archived completed job identifier.
      required: true
      selector:
        text: {}
    rebuild_csv:
      name: Rebuild CSV
      description: Also rebuild CSV exports after restoring the job.
      required: false
      selector:
        boolean: {}

get_dashboard_snapshot:
  name: Get dashboard snapshot
  description: >
    Return one unified card-friendly payload containing job progress, job control,
    start status, lifecycle, and upkeep for one vacuum/map.
  fields:
    vacuum_entity_id:
      name: Vacuum entity
      required: true
      selector:
        entity:
          domain: vacuum
    map_id:
      name: Map ID
      description: Leave blank to use the current active map.
      required: false
      selector:
        text: {}

get_dock_action_status:
  name: Get dock action status
  description: >
    Return gated availability and blocked reasons for wash mop, dry mop, and
    empty dust actions.
  fields:
    vacuum_entity_id:
      name: Vacuum entity
      required: true
      selector:
        entity:
          domain: vacuum
    map_id:
      name: Map ID
      description: Leave blank to use the current active map.
      required: false
      selector:
        text: {}

clear_active_job:
  name: Clear active job
  description: Clear the active job record.
  fields:
    vacuum_entity_id:
      name: Vacuum entity
      required: true
      selector:
        entity:
          domain: vacuum
    map_id:
      name: Map ID
      description: Leave blank to use the current active map.
      required: false
      selector:
        text: {}

get_lifecycle_state:
  name: Get lifecycle state
  description: >
    Return the current lifecycle state for a vacuum.
    States include: ready, cleaning, dock_drying, cancelled, failed, etc.
  fields:
    vacuum_entity_id:
      name: Vacuum entity
      required: true
      selector:
        entity:
          domain: vacuum
    map_id:
      name: Map ID
      description: Leave blank to use the current active map.
      required: false
      selector:
        text: {}

get_start_status:
  name: Get start status
  description: >
    Check whether a cleaning job can be started.
    Returns onboarding_required if any enabled room lacks a confirmed floor type.
  fields:
    vacuum_entity_id:
      name: Vacuum entity
      required: true
      selector:
        entity:
          domain: vacuum
    map_id:
      name: Map ID
      description: Leave blank to use the current active map.
      required: false
      selector:
        text: {}

start_selected_rooms:
  name: Start selected rooms
  description: >
    Send the resolved payload to the vacuum and start cleaning.
    Honors room blockers, access dependencies, modifier rules, and reduced-run confirmation.
  fields:
    vacuum_entity_id:
      name: Vacuum entity
      required: true
      selector:
        entity:
          domain: vacuum
    map_id:
      name: Map ID
      description: Leave blank to use the current active map.
      required: false
      selector:
        text: {}
    confirm_reduced_run:
      name: Confirm reduced run
      required: false
      selector:
        boolean: {}
    confirm_token:
      name: Confirmation token
      required: false
      selector:
        text: {}
    strict_order:
      name: Strict room order
      description: >
        Clean rooms strictly in the queue order by dispatching one room at a time
        (the next starts only after the previous finishes). Only affects brands
        that otherwise path-optimize and ignore the dispatched order (e.g.
        Roborock); no-op for brands that already honor order. Slower (a dock trip
        between rooms). Default off.
      required: false
      selector:
        boolean: {}
    path_block_action:
      name: Path-block reaction
      description: >
        What to do if blocker rules change during the active run and remaining rooms become inaccessible.
        event_only fires the path-blocked event only, pause_and_event pauses the job then fires the event,
        and cancel_and_event cancels the job then fires the event.
      required: false
      selector:
        select:
          options:
            - label: Event only
              value: event_only
            - label: Pause and event
              value: pause_and_event
            - label: Cancel and event
              value: cancel_and_event

start_zone_clean:
  name: Start zone clean
  description: >
    Clean one or more free-form rectangular zones instead of whole rooms.
    Fire-and-forget (no room-id job tracking). Each zone is normalized
    [x0, y0, x1, y1] — fractions 0-1 of the live-map image with (0,0) at the
    top-left; the provider converts them to the device's world frame. Requires
    a provider that supports zone cleaning (capability supports_zone_clean).
  fields:
    vacuum_entity_id:
      name: Vacuum entity
      required: true
      selector:
        entity:
          integration: eufy_vacuum
          domain: vacuum
    zones:
      name: Zones
      description: >
        List of rectangles, each [x0, y0, x1, y1] as fractions 0-1 of the live
        map image (top-left origin). Example: [[0.05, 0.70, 0.35, 0.95]].
      required: true
      example: "[[0.05, 0.70, 0.35, 0.95]]"
      selector:
        object: {}
    clean_times:
      name: Clean times
      description: Number of cleaning passes per zone (1-10).
      required: false
      default: 1
      selector:
        number:
          min: 1
          max: 10
          step: 1
          mode: box
    map_id:
      name: Map ID
      description: >
        Leave blank to use the current active map. Zone clean always targets the
        provider's currently-loaded map regardless, so this is informational only.
      required: false
      selector:
        text: {}

# ============================================================
# BATTERY HEALTH
# ============================================================

battery_rebaseline:
  name: Rebaseline battery health
  description: >
    Clear the health baseline anchor so the next qualifying recharge
    re-anchors it. Use after replacing the battery. Does not affect cycle
    count, per-job metrics, or aggregates — only the health % comparison
    baseline.
  fields:
    vacuum_entity_id:
      name: Vacuum
      description: The vacuum entity whose baseline should be cleared.
      required: true
      selector:
        entity:
          integration: eufy_vacuum
          domain: vacuum
    pause_timeout_minutes_override:
      name: Pause timeout override (minutes)
      description: >
        Optional one-job override for how long this run may remain paused before it is auto-cancelled.
        Set to 0 to disable auto-cancel for this job.
      required: false
      selector:
        number:
          min: 0
          max: 1440
          step: 1
          mode: box

start_run_profile:
  name: Start run profile
  description: >
    Apply a saved run profile, rebuild the queue, and start it through the same protected start flow.
    If the resolved run is reduced by blockers or access rules, the service returns
    confirmation_required unless confirm_reduced_run is explicitly set to true or a valid
    confirm_token is provided.
  fields:
    vacuum_entity_id:
      name: Vacuum entity
      required: true
      selector:
        entity:
          domain: vacuum
    map_id:
      name: Map ID
      description: Leave blank to use the current active map.
      required: false
      selector:
        text: {}
    profile_id:
      name: Profile ID
      required: true
      selector:
        text: {}
    confirm_reduced_run:
      name: Confirm reduced run
      description: Explicitly allow a reduced run to start when the preflight would otherwise require confirmation.
      required: false
      selector:
        boolean: {}
    confirm_token:
      name: Confirmation token
      description: Retry token returned by a prior confirmation_required response.
      required: false
      selector:
        text: {}
    path_block_action:
      name: Path-block reaction
      description: >
        What to do if blocker rules change during the active run and remaining rooms become inaccessible.
        event_only fires the path-blocked event only, pause_and_event pauses the job then fires the event,
        and cancel_and_event cancels the job then fires the event.
      required: false
      selector:
        select:
          options:
            - label: Event only
              value: event_only
            - label: Pause and event
              value: pause_and_event
            - label: Cancel and event
              value: cancel_and_event
    pause_timeout_minutes_override:
      name: Pause timeout override (minutes)
      description: >
        Optional one-job override for how long this run may remain paused before it is auto-cancelled.
        Set to 0 to disable auto-cancel for this job.
      required: false
      selector:
        number:
          min: 0
          max: 1440
          step: 1
          mode: box

pause_active_job:
  name: Pause active job
  description: >
    Pause the vacuum and mark the integration-owned active job as paused.
  fields:
    vacuum_entity_id:
      name: Vacuum entity
      required: true
      selector:
        entity:
          domain: vacuum
    map_id:
      name: Map ID
      description: Leave blank to use the current active map.
      required: false
      selector:
        text: {}

resume_active_job:
  name: Resume active job
  description: >
    Resume the vacuum and the integration-owned paused job.
  fields:
    vacuum_entity_id:
      name: Vacuum entity
      required: true
      selector:
        entity:
          domain: vacuum
    map_id:
      name: Map ID
      description: Leave blank to use the current active map.
      required: false
      selector:
        text: {}

cancel_active_job:
  name: Cancel active job
  description: >
    Return the vacuum to base, finalize the integration-owned job as cancelled,
    and emit the job-finished event for the card.
  fields:
    vacuum_entity_id:
      name: Vacuum entity
      required: true
      selector:
        entity:
          domain: vacuum
    map_id:
      name: Map ID
      description: Leave blank to use the current active map.
      required: false
      selector:
        text: {}

wash_mop:
  name: Wash mop
  description: >
    Run the upstream dock wash action only when the dock state and vacuum state
    make it valid to do so.
  fields:
    vacuum_entity_id:
      name: Vacuum entity
      required: true
      selector:
        entity:
          domain: vacuum
    map_id:
      name: Map ID
      description: Leave blank to use the current active map.
      required: false
      selector:
        text: {}

dry_mop:
  name: Dry mop
  description: >
    Run the upstream dock dry action only when the dock state and vacuum state
    make it valid to do so.
  fields:
    vacuum_entity_id:
      name: Vacuum entity
      required: true
      selector:
        entity:
          domain: vacuum
    map_id:
      name: Map ID
      description: Leave blank to use the current active map.
      required: false
      selector:
        text: {}

stop_dry_mop:
  name: Stop dry mop
  description: >
    Run the upstream dock stop-dry action only when the dock is actively drying.
  fields:
    vacuum_entity_id:
      name: Vacuum entity
      required: true
      selector:
        entity:
          domain: vacuum
    map_id:
      name: Map ID
      description: Leave blank to use the current active map.
      required: false
      selector:
        text: {}

empty_dust:
  name: Empty dust
  description: >
    Run the upstream dock dust-empty action only when the dock state and vacuum
