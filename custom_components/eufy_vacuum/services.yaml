  fields:
    vacuum_entity_id:
      name: Vacuum entity
      required: true
      selector:
        entity:
          domain: vacuum
    map_id:
      name: Map ID
      description: Leave blank to use the current active map.
      required: false
      selector:
        text: {}

get_pause_timeout_settings:
  name: Get pause timeout settings
  description: >
    Return the persisted default paused-job timeout for one vacuum. The card can
    use this as the backend default when no per-job override is supplied.
  fields:
    vacuum_entity_id:
      name: Vacuum entity
      required: true
