# ============================================================
# Vacuum Agent — Service Definitions
# ============================================================
#
# Groups:
#   Room management
#   Queue & payload
#   Profiles
#   Onboarding
#   Maintenance
#   Learning
#   Theme
#   Battery health
#   Error tracking
#   Map UI overlay state
#

# ============================================================
# ROOM MANAGEMENT
# ============================================================

discover_rooms:
  name: Discover rooms
  description: >
    Discover rooms from the underlying vacuum integration (whichever
    integration provides the vacuum.* entity; e.g. eufy-clean for Eufy).
    Results are written to discovery state only — no rooms are created.
    Call save_managed_rooms to create room entities from discovery results.
  fields:
    vacuum_entity_id:
      name: Vacuum entity
      required: true
      selector:
        entity:
          domain: vacuum
    map_id:
      name: Map ID
      description: Leave blank to use the current active map.
      required: false
      selector:
        text: {}

save_managed_rooms:
  name: Save managed rooms
  description: >
    Create managed room configuration from selected discovery results.
    This is the only path that creates room entities. Floor type and
    carpet type must be supplied for each room at creation time.
  fields:
    vacuum_entity_id:
      name: Vacuum entity
      required: true
      selector:
        entity:
          domain: vacuum
    map_id:
      name: Map ID
      description: Leave blank to use the current active map.
      required: false
      selector:
        text: {}
    enabled_room_ids:
      name: Enabled room IDs
      description: List of room IDs to create as managed rooms.
      required: true
      selector:
        object: {}
    floor_types:
      name: Floor types
      description: >
        Dict mapping room_id to floor type.
        Valid values: hardwood, laminate, tile, marble, carpet.
      required: false
      selector:
        object: {}
    carpet_types:
      name: Carpet types
      description: >
        Dict mapping room_id to carpet subtype for carpet rooms.
        Valid values: low_pile, high_pile.
      required: false
      selector:
        object: {}

reconcile_room:
  name: Reconcile room identity
  description: >
    Apply or dismiss the identity-shift reviews surfaced by discover_rooms when
    a brand renumbers segment ids on re-segment (e.g. Roborock). action=migrate
    rebuilds the saved rooms onto their new segment ids, carrying durable
    per-room settings (matched by name slug) and rewriting access-graph grants;
    action=ignore leaves stored data untouched and dismisses the reviews. A
    re-segment renumbers many rooms at once, so this is one per-map decision.
  fields:
    vacuum_entity_id:
      name: Vacuum entity
      required: true
      selector:
        entity:
          domain: vacuum
    map_id:
      name: Map ID
      required: true
      selector:
        text: {}
    action:
      name: Action
      description: migrate (apply the re-map) or ignore (dismiss the reviews).
      required: false
      default: migrate
      selector:
        select:
          options:
            - migrate
            - ignore

get_vacuum_maps:
  name: Get vacuum maps
  description: Return all known maps for a vacuum.
  fields:
    vacuum_entity_id:
      name: Vacuum entity
      required: true
      selector:
        entity:
          domain: vacuum

update_room_fields:
  name: Update room fields
  description: >
    Apply per-room field overrides without requiring a named profile.
    Only supplied fields are changed — others stay unchanged.
    Sets profile_name to "custom" to signal divergence from a preset.
    Water-on-carpet enforcement is applied at payload time regardless
    of what is stored here.
  fields:
    vacuum_entity_id:
      name: Vacuum entity
      required: true
      selector:
        entity:
          domain: vacuum
    map_id:
      name: Map ID
      description: Leave blank to use the current active map.
      required: false
      selector:
        text: {}
    room_id:
      name: Room ID
      required: true
      selector:
        number:
          min: 0
          max: 9999
          step: 1
          mode: box
    enabled:
      name: Enabled
      description: Enable or disable the room for queue and start payload generation.
      required: false
      selector:
        boolean: {}
    clean_mode:
      name: Clean mode
      required: false
      selector:
        text: {}
    fan_speed:
      name: Fan speed
      required: false
      selector:
        text: {}
    water_level:
      name: Water level
      required: false
      selector:
        text: {}
    clean_intensity:
      name: Clean intensity
      required: false
      selector:
        text: {}
    clean_passes:
      name: Clean passes
      required: false
      selector:
        number:
          min: 1
          max: 2
          step: 1
          mode: box
    edge_mopping:
      name: Edge mopping
      required: false
      selector:
        boolean: {}
    is_dock_room:
      name: Dock room
      description: Mark this room as the dock/root room for the access graph.
      required: false
      selector:
        boolean: {}
    grants_access_to:
      name: Grants access to
      description: Downstream room IDs this room logically leads to.
      required: false
      selector:
        object: {}
    rules:
      name: Room rules
      description: Dynamic blocker and modifier rule definitions for this room.
      required: false
      selector:
        object: {}

get_room_access_editor:
  name: Get room access editor
  description: >
    Return the backend-authored access graph editor payload for one room,
    including editable outbound links, derived inbound links, stale links,
    and room-specific graph issues.
  fields:
    vacuum_entity_id:
      name: Vacuum entity
      required: true
      selector:
        entity:
          domain: vacuum
    map_id:
      name: Map ID
      description: Leave blank to use the current active map.
      required: false
      selector:
        text: {}
    room_id:
      name: Room ID
      required: true
      selector:
        number:
          min: 0
          max: 9999
          step: 1
          mode: box

get_access_graph_health:
  name: Get access graph health
  description: >
    Return whole-map access graph health, including missing room references
    and formatted graph issues for sidebar rendering.
  fields:
    vacuum_entity_id:
      name: Vacuum entity
      required: true
      selector:
        entity:
          domain: vacuum
    map_id:
      name: Map ID
      description: Leave blank to use the current active map.
      required: false
      selector:
        text: {}

