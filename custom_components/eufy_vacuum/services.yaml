# ============================================================
# MAINTENANCE
# ============================================================

reset_maintenance:
  name: Reset maintenance
  description: >
    Reset the maintenance counter for a specific component after cleaning or replacement.
  fields:
    vacuum_entity_id:
      name: Vacuum entity
      required: true
      selector:
        entity:
          domain: vacuum
    component:
      name: Component
      description: >
        The maintenance component to reset.
        Valid values: brush, side_brush, filter, mop, sensor.
      required: true
      selector:
        text: {}

set_maintenance_interval:
  name: Set maintenance interval
  description: >
    Override the maintenance interval (in hours) for a specific component.
    Writes to the same storage slot as the number.* maintenance interval
    entity, so the card editor and the entity stay in sync. Card-side UI
    validates against the adapter's declared default/max before submitting.
  fields:
    vacuum_entity_id:
      name: Vacuum entity
      required: true
      selector:
        entity:
          domain: vacuum
    component:
      name: Component
      description: >
        The maintenance component whose interval to override.
        Valid values: brush, side_brush, filter, mop, sensor.
      required: true
      selector:
        text: {}
    interval_hours:
      name: Interval (hours)
      description: >
        New maintenance interval in hours. Rounded to one decimal place.
        Must be greater than zero.
      required: true
      selector:
        number:
          min: 0
          step: 0.5
          mode: box
          unit_of_measurement: h

# ============================================================
# LEARNING
# ============================================================

save_learning_snapshot:
  name: Save learning snapshot
  description: >
    Manually save a learning snapshot for the current job state.
    This is called automatically by start_selected_rooms — manual
    use is only needed for edge cases.
  fields:
    vacuum_entity_id:
      name: Vacuum entity
      required: true
      selector:
        entity:
          domain: vacuum
    map_id:
      name: Map ID
      description: Leave blank to use the current active map.
      required: false
      selector:
        text: {}
    started_at:
      name: Started at
      description: Job start timestamp in YYYY-MM-DDTHH:MM:SS format.
      required: true
      selector:
        text: {}
    battery_start:
      name: Battery start
      description: Battery percent at job start.
      required: true
      selector:
        number:
          min: 0
          max: 100
          step: 1
          mode: box
    job_id:
      name: Job ID
      description: Optional custom job ID.
      required: false
      selector:
        text: {}

finalize_learning_job:
  name: Finalize learning job
  description: >
    Manually finalize a completed job and optionally rebuild learned stats.
    This is called automatically when the vacuum returns to dock — manual
    use is only needed for edge cases or historical corrections.
  fields:
    vacuum_entity_id:
      name: Vacuum entity
      required: true
      selector:
        entity:
          domain: vacuum
    map_id:
      name: Map ID
      description: Leave blank to use the current active map.
      required: false
      selector:
        text: {}
    battery_start:
      name: Battery start
      required: true
      selector:
        number:
          min: 0
          max: 100
          step: 1
          mode: box
    battery_end:
      name: Battery end
      required: true
      selector:
        number:
          min: 0
          max: 100
          step: 1
          mode: box
    started_at:
      name: Started at
      description: Job start timestamp in YYYY-MM-DDTHH:MM:SS format.
      required: true
      selector:
        text: {}
    ended_at:
      name: Ended at
      description: Optional end timestamp. Defaults to now.
      required: false
      selector:
        text: {}
    used_for_learning:
      name: Used for learning
      required: false
      default: true
      selector:
        boolean: {}
    rebuild_stats:
      name: Rebuild stats
      required: false
      default: true
      selector:
        boolean: {}
    rebuild_csv:
      name: Rebuild CSV
      required: false
      default: false
      selector:
        boolean: {}

rebuild_learning_stats:
  name: Rebuild learning stats
  description: >
    Rebuild learned job and room stats from all completed job history.
    Called automatically after finalize_learning_job — manual use forces
    a full rebuild from scratch.
  fields:
    vacuum_entity_id:
      name: Vacuum entity
      required: true
      selector:
        entity:
          domain: vacuum
    rebuild_csv:
      name: Rebuild CSV
      required: false
      default: false
      selector:
        boolean: {}

run_learning_estimate:
  name: Run learning estimate
  description: >
    Compute a full job estimate from learned room history and current queue state.
    Returns per-room ETAs, confidence scores, overhead breakdown, and battery info.
    Battery is informational only — low battery never blocks the job since the
    vacuum recharges mid-job and resumes.
  fields:
    vacuum_entity_id:
      name: Vacuum entity
      required: true
      selector:
        entity:
          domain: vacuum
    map_id:
      name: Map ID
      description: Leave blank to use the current active map.
      required: false
      selector:
        text: {}
    current_battery:
      name: Current battery
      description: Current battery percent. Used for battery warning calculation.
      required: false
      default: 0.0
      selector:
        number:
          min: 0
          max: 100
          step: 1
          mode: box
    charge_percent_per_minute:
      name: Charge rate (% per minute)
      required: false
      default: 1.0
      selector:
        number:
          min: 0.1
          max: 10
          step: 0.1
          mode: box
    reserve_battery_percent:
      name: Reserve battery %
      description: Minimum battery buffer to keep in reserve.
      required: false
      default: 5.0
      selector:
        number:
          min: 0
          max: 20
          step: 1
          mode: box
    started_at:
      name: Started at
      description: >
        ISO timestamp to use as ETA anchor. Leave blank to use now.
      required: false
      selector:
        text: {}

record_estimate_accuracy:
  name: Record estimate accuracy
  description: >
    Record estimated vs actual minutes per room after a job completes.
    Called automatically by finalize_learning_job — manual use is only
    needed when supplying per-room actuals from an external source such
    as another external source.
  fields:
    vacuum_entity_id:
      name: Vacuum entity
      required: true
      selector:
        entity:
          domain: vacuum
    room_actuals:
      name: Room actuals
      description: >
        List of dicts, each with: slug, clean_mode, clean_passes,
        is_carpet, clean_intensity, map_id, estimated_minutes,
        actual_minutes. Optional: single_room (bool).
      required: true
      selector:
        object: {}

reanchor_learning_timeline:
  name: Reanchor learning timeline
  description: >
    Recompute room ETAs using actual completed room durations mid-job.
    Call when one or more rooms are confirmed complete from an external timing or review source.
    Pass ALL completed rooms so far, not just the latest one.
  fields:
    original_estimate:
      name: Original estimate
      description: The full estimate payload from run_learning_estimate.
      required: true
      selector:
        object: {}
    completed_rooms:
      name: Completed rooms
      description: >
        List of completed rooms. Each entry needs room_id or slug,
        and actual_duration_minutes.
      required: true
      selector:
        object: {}
    reanchor_at:
      name: Reanchor at
      description: ISO timestamp to anchor remaining ETAs from. Defaults to now.
      required: false
      selector:
        text: {}
    current_battery:
      name: Current battery
      description: If supplied, updates battery warning for remaining rooms.
      required: false
      selector:
        number:
          min: 0
          max: 100
          step: 1
          mode: box

get_next_room:
  name: Get next room
  description: >
    Return the next incomplete room from a reanchored timeline.
    Lightweight shortcut — returns only what the live job banner needs.
    Returns empty dict when all rooms are complete.
  fields:
    reanchored_estimate:
      name: Reanchored estimate
      description: The latest payload from reanchor_learning_timeline.
      required: true
      selector:
        object: {}

exclude_learning_job:
  name: Exclude learning job
  description: >
    Exclude one archived completed job from learned stats without deleting the
    JSON record. Rebuilds learned stats immediately so bad runs stop affecting
    future estimates.
  fields:
    vacuum_entity_id:
      name: Vacuum entity
      required: true
      selector:
        entity:
          domain: vacuum
    job_id:
      name: Job ID
      description: Completed job ID, for example job_2026-04-08T17-41-53.
      required: true
      selector:
        text: {}
    reason:
      name: Exclusion reason
      description: Optional reason stored on the archived job outcome.
      required: false
      default: manual_exclusion
      selector:
        text: {}
    rebuild_csv:
      name: Rebuild CSV
      description: Also rebuild flat CSV exports after exclusion.
      required: false
      default: false
      selector:
        boolean: {}

# ============================================================
# THEME
# ============================================================

get_theme_library:
  name: Get theme library
  description: Return the full theme library with tokens, colors, and alpha values.

save_theme_as_new:
  name: Save theme as new
  description: >
    Save a vacuum's current working draft as a new named theme in the library.
    Clears draft_dirty on the vacuum.
  fields:
    vacuum_entity_id:
      name: Vacuum entity
      required: true
      selector:
        entity:
          domain: vacuum
    name:
      name: Theme name
      required: true
      selector:
        text: {}
    set_as_default:
      name: Set as global default
      required: false
      default: false
      selector:
        boolean: {}

overwrite_theme:
  name: Overwrite theme
  description: >
    Replace an existing library theme with a vacuum's current working draft.
    Clears draft_dirty on the vacuum.
  fields:
    vacuum_entity_id:
      name: Vacuum entity
      required: true
      selector:
        entity:
          domain: vacuum
    theme_id:
      name: Theme ID
      required: true
      selector:
        text: {}

rename_theme:
  name: Rename theme
  description: Update the display name of a library theme.
  fields:
    theme_id:
      name: Theme ID
      required: true
      selector:
        text: {}
    name:
      name: New name
      required: true
      selector:
        text: {}

set_theme_tags:
  name: Set theme tags
  description: >
    Replace a theme's free-text "vibe" tags (aurora, cozy, retro…). An empty
    list clears them. Facet tags (mode/accent/…) and colorblind-safe are derived
    from the palette and verified by the card — they are never set here.
  fields:
    theme_id:
      name: Theme ID
      required: true
      selector:
        text: {}
    tags:
      name: Tags
      description: Free-text tags. Send an empty list to clear.
      required: true
      selector:
        object: {}

delete_theme:
  name: Delete theme
  description: >
    Remove a theme from the library.
    Clears active_theme_id on any vacuum that was using it.
  fields:
    theme_id:
      name: Theme ID
      required: true
      selector:
        text: {}

set_active_theme:
  name: Set active theme
  description: >
    Point a vacuum at a library theme.
    The working draft is cleared so preview resolves from the active theme
    plus any future draft overrides.
    Omit vacuum_entity_id to set the global default only without
    changing any per-vacuum draft state.
  fields:
    vacuum_entity_id:
      name: Vacuum entity
      description: Leave blank to set global default only.
      required: false
      selector:
        entity:
          domain: vacuum
    theme_id:
      name: Theme ID
      required: true
      selector:
        text: {}

update_working_draft:
  name: Update working draft
  description: >
    Patch-merge partial token, color, and/or alpha overrides into a vacuum's
    working draft. Keys sent with null or an empty string are removed from the
    draft. The theme sensor updates automatically.
  fields:
    vacuum_entity_id:
      name: Vacuum entity
      required: true
      selector:
        entity:
          domain: vacuum
    tokens:
      name: Tokens
      description: Dict mapping token names to values. This is the canonical theme bucket.
      required: false
      selector:
        object: {}
    colors:
      name: Colors
      description: Dict mapping color token names to values. Kept for compatibility.
      required: false
      selector:
        object: {}
    alpha:
      name: Alpha
      description: Dict mapping alpha token names to opacity values (0.0–1.0).
      required: false
      selector:
        object: {}

revert_draft:
  name: Revert draft
  description: >
    Clear a vacuum's working draft overrides so preview resolves back to the
    active theme.
    Clears draft_dirty. The theme sensor updates automatically.
  fields:
    vacuum_entity_id:
      name: Vacuum entity
      required: true
      selector:
        entity:
          domain: vacuum

export_theme:
  name: Export theme
  description: >
    Return a theme as a portable JSON-safe payload with tokens, colors, and alpha.
  fields:
    theme_id:
      name: Theme ID
      required: true
      selector:
        text: {}

import_theme:
  name: Import theme
  description: >
    Import a theme from an exported payload. Handles name collisions by
    appending "(imported)".
  fields:
    payload:
      name: Payload
      description: The full export payload dict from export_theme.
      required: true
      selector:
        object: {}

get_room_learning_estimates:
  name: Get room learning estimates
  description: >
    Return per-room learning estimates for all rooms on a map based on each
    room's current effective persisted settings. Queue-independent — queued
    and unqueued rooms both receive estimates. Safe for frequent UI refreshes.
    No side effects.
  fields:
    vacuum_entity_id:
      name: Vacuum entity
      required: true
      selector:
        entity:
          domain: vacuum
    map_id:
      name: Map ID
      description: Leave blank to use the current active map.
      required: false
      selector:
        text: {}
    current_battery:
      name: Current battery
      description: Optional current battery %. Informational only — never blocks.
      required: false
      selector:
        number:
          min: 0
          max: 100
          step: 1
          mode: box

get_learning_history_snapshot:
  name: Get learning history snapshot
  description: >
    Return a card-friendly snapshot of learned history, including recent jobs,
    room aggregates, room profile aggregates, and learned room statistics.
    Supports optional filtering by room, profile, job status, and learning use.
  fields:
    vacuum_entity_id:
      name: Vacuum entity
      required: true
      selector:
        entity:
          domain: vacuum
    room_slug:
      name: Room slug
      description: Optional room slug filter, for example kitchen.
      required: false
      selector:
        text: {}
    profile_key:
      name: Profile key
      description: Optional room profile signature from the learning index.
      required: false
      selector:
        text: {}
    status:
      name: Job status
      description: Optional filter such as completed, cancelled, failed, or interrupted.
      required: false
      selector:
        text: {}
    used_for_learning:
      name: Used for learning
      description: Optional filter for whether jobs were used in learned stats.
      required: false
      selector:
        boolean: {}
    limit:
      name: Job limit
      description: Maximum number of recent matching jobs to return.
      required: false
      default: 50
      selector:
        number:
          min: 1
          max: 500
          step: 1
          mode: box

retry_missed_rooms:
  name: Retry missed rooms
  description: >
    Re-queue only the rooms that were missed in the last incomplete run and
    start cleaning immediately. Reads the stored incomplete run log to determine
    which rooms were skipped, enables only those rooms, and starts the job.

    Designed for automation use: pair with the eufy_vacuum_run_incomplete event
    trigger so the vacuum automatically retries missed rooms after a cancelled
    or interrupted run.

    Returns started: true on success, or started: false with a reason field
    when the incomplete run log is absent, empty, or the start is blocked.
  fields:
    vacuum_entity_id:
      name: Vacuum entity
      description: The vacuum to retry cleaning for.
      required: true
      selector:
        entity:
          domain: vacuum
    map_id:
      name: Map ID
      description: >
        The map to use. Defaults to the map_id stored in the incomplete run log,
        so this can usually be omitted when triggered by eufy_vacuum_run_incomplete.
      required: false
      selector:
        text: {}
    confirm_reduced_run:
      name: Confirm reduced run
      description: >
        Proceed even when blockers or access rules would normally require
        confirmation. Defaults to true for automation use.
      required: false
      default: true
      selector:
        boolean: {}
    path_block_action:
      name: Path-block reaction
      description: >
        What to do if blocker rules change mid-run and remaining rooms become
        inaccessible. event_only fires the path-blocked event only,
        pause_and_event pauses then fires, cancel_and_event cancels then fires.
      required: false
      selector:
        select:
          options:
            - label: Event only
              value: event_only
            - label: Pause and event
              value: pause_and_event
            - label: Cancel and event
              value: cancel_and_event

# ============================================================
# ERROR TRACKING
# ============================================================

acknowledge_error:
  name: Acknowledge error
  description: >
    Clear the active-run / last-device error latch(es) for one vacuum.
    Does not affect upstream — the next rising edge will recreate
    whichever latch the upstream condition triggers. Use after acting
    on an error to reset the integration's state.
  fields:
    vacuum_entity_id:
      name: Vacuum
      description: The vacuum entity whose error latches should be cleared.
      required: true
      selector:
        entity:
          integration: eufy_vacuum
          domain: vacuum
    scope:
      name: Scope
      description: >
        Which latch(es) to clear. active_run = in-flight run only,
        last_device = persistent last-device only, both = both (default).
      required: false
      default: both
      selector:
        select:
          options:
            - label: Active run only
              value: active_run
            - label: Last device only
              value: last_device
            - label: Both
              value: both

get_recent_errors:
  name: Get recent errors
  description: >
    Return the last N entries from the per-device recent_errors ring buffer
    (cap 50). Entries are appended on every rising edge regardless of run
    context, so this includes both run-time and idle-time errors.
  fields:
    vacuum_entity_id:
      name: Vacuum
      description: The vacuum entity to query.
      required: true
      selector:
        entity:
          integration: eufy_vacuum
          domain: vacuum
    limit:
      name: Limit
      description: Maximum number of entries to return (1-50).
      required: false
      default: 20
      selector:
        number:
          min: 1
          max: 50
          mode: box

# ============================================================
# MAP UI OVERLAY STATE
# ============================================================

set_segment_room_link:
  name: Set segment-room link
  description: >
    Persist (or clear) the link between an image-detected map segment
    and a managed room. Replaces the card's previous browser-localStorage
    storage so the linkage survives across browsers and devices.
    Pass a null/empty room_id to clear an existing link.
  fields:
    vacuum_entity_id:
      name: Vacuum
      required: true
      selector:
        entity:
          integration: eufy_vacuum
          domain: vacuum
    map_id:
      name: Map ID
      description: Leave blank to use the current active map.
      required: false
      selector:
        text: {}
    segment_id:
      name: Segment ID
      description: e.g. "segment_4"
      required: true
      selector:
        text: {}
    room_id:
      name: Room ID
      description: Pass null or omit to clear the link.
      required: false
      selector:
        text: {}

set_segmentation_mode:
  name: Set segmentation mode
  description: >
    Toggle a map between CV (auto-detected) and Custom (manually authored)
    segmentation. Only flips the active source — it never re-runs the segmenter
    in either direction, so the CV and Custom segment sets each survive a
    round-trip untouched.
  fields:
    vacuum_entity_id:
      name: Vacuum
      required: true
      selector:
        entity:
          integration: eufy_vacuum
          domain: vacuum
    map_id:
      name: Map ID
      required: true
      selector:
        text: {}
    mode:
      name: Mode
      description: "cv = auto-detected segments; custom = manually authored polygons."
      required: true
      selector:
        select:
          options:
            - cv
            - custom

set_custom_segments:
  name: Set custom segments
  description: >
    Author no-CV map segments from primitive shapes (replace-all). Rebuilds the
    map's custom segment set from the supplied list; each segment's primitives
    (rect/circle/polygon, coordinates in 0-100 map percentages, optional
    op: subtract) are rasterised server-side into a polygon. Requires a 'custom'
    backdrop image (uploaded via upload_map_image) for the pixel dimensions.
    Never runs the segmenter.
  fields:
    vacuum_entity_id:
      name: Vacuum
      required: true
      selector:
        entity:
          integration: eufy_vacuum
          domain: vacuum
    map_id:
      name: Map ID
      required: true
      selector:
        text: {}
    segments:
      name: Segments
      description: >
        List of {id?, primitives: [...]}. A primitive is
        {type: rect|circle|polygon, op?: add|subtract, ...coords in 0-100%}.
      required: true
      selector:
        object: {}

set_companion_anchor:
  name: Set companion anchor
  description: >
    Persist (or clear) the per-room anchor position for the animated
    companion sprite. pct_x/pct_y are 0-100 percentages from the map
    image's top-left. Omit both to clear the anchor.
  fields:
    vacuum_entity_id:
      name: Vacuum
      required: true
      selector:
        entity:
          integration: eufy_vacuum
          domain: vacuum
    map_id:
      name: Map ID
      description: Leave blank to use the current active map.
      required: false
      selector:
        text: {}
    room_id:
      name: Room ID
      required: true
      selector:
        text: {}
    pct_x:
      name: X position (0-100%)
      required: false
      selector:
        number:
          min: 0
          max: 100
          step: 0.01
          mode: box
    pct_y:
      name: Y position (0-100%)
      required: false
      selector:
        number:
          min: 0
          max: 100
          step: 0.01
          mode: box

set_live_map_rotation:
  name: Set live map rotation
  description: >
    Set the display rotation (0/90/180/270°) of the live map image in the card's
    Map view, so it matches how you picture your home. Display only — never affects
    cleaning (dispatch is by room). Stored per map so it follows you across devices.
  fields:
    vacuum_entity_id:
      name: Vacuum
      required: true
      selector:
        entity:
          integration: eufy_vacuum
          domain: vacuum
    map_id:
      name: Map ID
      description: Leave blank to use the current active map.
      required: false
      selector:
        text: {}
    rotation:
      name: Rotation (degrees)
      required: true
      selector:
        select:
          options:
            - "0"
            - "90"
            - "180"
            - "270"

set_map_overlay_visibility:
  name: Set map overlay visibility
  description: >
    Show or hide individual map overlay layers (room labels, room area, current room,
    robot, dock, no-go / no-mop zones, virtual walls, saved zones, cleaning path,
    obstacles) in the card's Map view. Stored per map (only your changes are kept,
    merged over the defaults). Display only — never affects cleaning.
  fields:
    vacuum_entity_id:
      name: Vacuum
      required: true
      selector:
        entity:
          integration: eufy_vacuum
          domain: vacuum
    map_id:
      name: Map ID
      description: Leave blank to use the current active map.
      required: false
      selector:
        text: {}
    visibility:
      name: Visibility
      description: >
        Map of overlay layer -> true/false (partial; only the layers you list change).
        Layers: room_labels, room_area, current_room, robot, dock, no_go, no_mop,
        walls, zones, path, obstacles.
      required: false
      selector:
        object: {}
    reset:
      name: Reset to defaults
      description: Clear all saved overrides and fall back to the default visibility.
      required: false
      default: false
      selector:
        boolean: {}

get_map_render_data:
  name: Get map render data
  description: >
    Return the raw room raster + decode params the card uses to draw its OWN map
    backdrop (no server-side image rendering). Adapter-driven; the card fetches this
    on demand and caches it by the returned version. Brands without a map_render
    config return present:false.
  fields:
    vacuum_entity_id:
      name: Vacuum
      required: true
      selector:
        entity:
          integration: eufy_vacuum
          domain: vacuum

get_map_live_pose:
  name: Get map live pose
  description: >
    Return the live moving-overlay pose (robot + dock anchors, current room, heading)
    from the provider's in-memory coordinator — fresher than the .storage-derived pose.
    The card polls this on the live cadence so the robot overlay isn't stale. Brands
    without a live_pose config return present:false.
  fields:
    vacuum_entity_id:
      name: Vacuum
      required: true
      selector:
        entity:
          integration: eufy_vacuum
          domain: vacuum

create_custom_layout:
  name: Create custom layout
  description: >
    Create and activate a new named custom segmentation layout for a map — its own
    backdrop image, authored segments, room links and mascot anchors. Flips the map
    into custom mode and returns the new layout_id.
  fields:
    vacuum_entity_id:
      name: Vacuum
      required: true
      selector:
        entity:
          integration: eufy_vacuum
          domain: vacuum
    map_id:
      name: Map ID
      required: true
      selector:
        text: {}
    name:
      name: Layout name
      required: false
      selector:
        text: {}

rename_custom_layout:
  name: Rename custom layout
  description: Rename an existing custom layout.
  fields:
    vacuum_entity_id:
      name: Vacuum
      required: true
      selector:
        entity:
          integration: eufy_vacuum
          domain: vacuum
    map_id:
      name: Map ID
      required: true
      selector:
        text: {}
    layout_id:
      name: Layout ID
      required: true
      selector:
        text: {}
    name:
      name: New name
      required: true
      selector:
        text: {}

delete_custom_layout:
  name: Delete custom layout
  description: >
    Delete a custom layout and its backdrop image. If the active layout is deleted
    the next one is activated, or the map flips back to CV if none remain.
  fields:
    vacuum_entity_id:
      name: Vacuum
      required: true
      selector:
        entity:
          integration: eufy_vacuum
          domain: vacuum
    map_id:
      name: Map ID
      required: true
      selector:
        text: {}
    layout_id:
      name: Layout ID
      required: true
      selector:
        text: {}

set_active_custom_layout:
  name: Set active custom layout
  description: >
    Activate a custom layout and flip the map into custom mode. A null or unknown
    layout_id auto-creates a default layout so custom mode always has a live store.
  fields:
    vacuum_entity_id:
      name: Vacuum
      required: true
      selector:
        entity:
          integration: eufy_vacuum
          domain: vacuum
    map_id:
      name: Map ID
      required: true
      selector:
        text: {}
    layout_id:
      name: Layout ID
      description: Omit to auto-create and activate a default layout.
      required: false
      selector:
        text: {}

