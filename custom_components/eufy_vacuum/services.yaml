        entity:
          domain: vacuum

set_pause_timeout_settings:
  name: Set pause timeout settings
  description: >
    Persist the default paused-job timeout for one vacuum. This default is used
    when a start call does not provide pause_timeout_minutes_override.
  fields:
    vacuum_entity_id:
      name: Vacuum entity
      required: true
      selector:
        entity:
          domain: vacuum
