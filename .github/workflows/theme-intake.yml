name: theme intake preview

# Two things publish to the ONE GitHub Pages site this repo gets:
#   1. The theme GALLERY — drop a theme export into gallery/themes/ (commit or
#      PR) and CI renders the real card recolored by it (or trigger by hand).
#      Every upload passes the ingest gate (validate + clamp, skip malformed /
#      unknown-namespace, never eval) before render. Built in the pinned
#      Playwright image, same as the visual-regression gate.
#   2. The DOCS site — MkDocs Material rendered from docs/ (the single source of
#      truth), built with --strict so a broken cross-link/anchor fails CI.
#
# A single Pages site can only serve one artifact, so on push to master both are
# assembled into one tree (gallery at /, docs at /docs/) and deployed together.
# PRs and manual dispatches build + validate but NEVER deploy (no clobbering the
# live site). A docs-only change still rebuilds the gallery (unchanged) and vice
# versa, so the combined deploy is always internally consistent.
#
# ONE-TIME SETUP: enable Pages with the GitHub Actions source
# (repo Settings -> Pages -> Build and deployment -> Source: GitHub Actions).
# Until then the build/artifact steps still work; only the deploy job fails.

on:
  workflow_dispatch:
    inputs:
      path:
        description: "Path to one export JSON (e.g. gallery/themes/x.json); blank = preview all"
        required: false
        default: ""
  push:
    paths:
      - "gallery/themes/*.json"
      - "harness/**"
      - "docs/**"
      - "mkdocs.yml"
      - ".github/workflows/theme-intake.yml"
  pull_request:
    paths:
      - "gallery/themes/*.json"
      - "docs/**"
      - "mkdocs.yml"

permissions:
  contents: read
  pages: write
  id-token: write

# Serialize Pages deploys; don't cancel an in-flight publish.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # 1. Render the theme gallery (unchanged from before — same Playwright image).
  gallery:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.60.0-noble
    steps:
      - uses: actions/checkout@v5

      - name: Install dependencies
        run: npm ci

      - name: Build harness bundle
        run: node harness/build.mjs

      - name: Render theme preview(s)
        run: node harness/preview.mjs "${{ github.event.inputs.path }}"

      - name: Upload gallery (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: gallery-site
          path: harness/out/preview/
          if-no-files-found: warn
          retention-days: 14

  # 2. Render the docs site from docs/ (strict = broken links/anchors fail CI).
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install MkDocs Material
        run: pip install mkdocs-material mkdocs-awesome-pages-plugin

      - name: Build docs (strict)
        run: mkdocs build --strict --site-dir docs-site

      - name: Upload docs (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: docs-site
          path: docs-site/
          if-no-files-found: error
          retention-days: 14

  # 3. Assemble both into one tree (gallery at /, docs at /docs) + publish.
  #    Push-to-master only; PRs/dispatch stop after the build+validate jobs.
  publish:
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: [gallery, docs]
    runs-on: ubuntu-latest
    steps:
      - name: Download gallery
        uses: actions/download-artifact@v4
        with:
          name: gallery-site
          path: public

      - name: Download docs
        uses: actions/download-artifact@v4
        with:
          name: docs-site
          path: public/docs

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: publish
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
