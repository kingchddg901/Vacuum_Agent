name: Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  pytest:
    name: pytest
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: requirements_test.txt

      - name: Install test dependencies
        run: pip install -r requirements_test.txt

      - name: Run tests
        run: pytest --tb=short
