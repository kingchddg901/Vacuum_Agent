name: Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    name: pytest
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: requirements_test.txt

      - name: Install test dependencies
        run: pip install -r requirements_test.txt

      # The behavior gate, matching the local one: pass `tests` explicitly so the
      # adapter suite (tests/adapters, not in pytest.ini testpaths) is gated too,
      # and --no-cov so the run is the canonical pass/fail gate (coverage is
      # inspection-only; CV instrumentation under --cov is a separate artifact).
      - name: Run test suite (behavior gate)
        run: python -m pytest tests --no-cov -p no:cacheprovider --tb=short

  node:
    name: node scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
      # Guards scripts/process-submission.mjs (the gallery-intake bot core) — it
      # has no deps (just the theme-tags core), so no install step is needed.
      - name: Run script tests
        run: node --test scripts/process-submission.test.mjs harness/lib/gallery-html.test.mjs
