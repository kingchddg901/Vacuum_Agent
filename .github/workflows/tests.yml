name: Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    name: pytest
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: requirements_test.txt

      - name: Install test dependencies
        run: pip install -r requirements_test.txt

      # The behavior gate, matching the local one: pass `tests` explicitly so the
      # adapter suite (tests/adapters, not in pytest.ini testpaths) is gated too,
      # and --no-cov so the run is the canonical pass/fail gate (coverage is
      # inspection-only; CV instrumentation under --cov is a separate artifact).
      - name: Run test suite (behavior gate)
        run: python -m pytest tests --no-cov -p no:cacheprovider --tb=short
