name: animal PR check

# The second intake path: a contributor opens a PR that adds/edits a community
# animal (gallery/animals/<id>.json + the generated animals/<id>.js). This gate
# runs scripts/check-animal-pr.mjs — the SAME contract gate + SVG sanitiser the
# issue intake uses — and refuses any framework edit, unsanitised SVG, or a
# hand-tampered generated module.
#
# Bot-opened submission PRs (from animal-submission.yml) don't trigger this —
# GitHub doesn't run workflows for GITHUB_TOKEN-opened PRs — so this is the
# human/fork-PR path only.

on:
  pull_request:
    paths:
      - "gallery/animals/**"
      - "custom_components/eufy_vacuum/frontend/animal-svg/animals/**"

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.60.0-noble
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Mark workspace safe for git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Install dependencies
        run: npm ci

      - name: Compute changed files
        run: |
          {
            echo "CHANGED_FILES<<__EOF__"
            git diff --name-only ${{ github.event.pull_request.base.sha }} HEAD
            echo "__EOF__"
          } >> "$GITHUB_ENV"

      - name: Check the animal PR
        run: node scripts/check-animal-pr.mjs
